<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REF Professional Equipment Estimator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast-container"></div>

        <h1 class="no-print">Equipment Selection</h1>
        <div class="container">
            <div class="customer-name-section no-print">
                <h2 style="background:var(--petzl-black); color:#fff;">見積依頼者 情報入力</h2>
                <div style="display: grid; gap: 10px; margin-top:10px;">
                    <label>貴社名: <input type="text" id="input-company" class="customer-input" placeholder="例：〇〇×× 株式会社"></label>
                    <label>担当者名: <input type="text" id="input-user" class="customer-input" placeholder="例：山田 太郎 様"></label>
                    <label>電話番号: <input type="text" id="input-tel" class="customer-input" placeholder="例：090-0000-0000"></label>
                </div>
            </div>

        <div id="print-header" class="print-only">
            <div class="print-top-row">
                <div class="client-side">
                    <div class="estimate-title-box">御見積依頼書</div>
                    <div class="target-address" style="font-size: 1.4rem; font-weight: bold; margin-bottom: 20px;">
                        株式会社 ＲＥＦ 御中
                    </div>
                </div>

               <div class="issuer-side" style="text-align: left; border: 1px solid #000; padding: 10px; min-width: 250px;">
                   <p style="font-size: 0.8rem; margin-bottom: 5px;">【ご依頼元】</p>
                   <div id="display-company" style="font-weight: bold; font-size: 1.1rem; border-bottom: 1px solid #ccc; margin-bottom: 5px;">（会社名）</div>
                   <div id="display-user" style="margin-bottom: 5px;">（担当者名）</div>
                   <div id="display-tel" style="font-size: 0.9rem;">TEL: （電話番号）</div>
               </div>
            </div>
        </div> 

        <div id="breadcrumb" class="breadcrumb">Category Select...</div>

        <section class="selection-section">
            <h2>Step 1: Type</h2>
            <div id="main-categories" class="button-group">
                <button onclick="selectCategory('A')">ハーネス</button>
                <button onclick="selectCategory('B')">ヘルメット</button>
                <button onclick="selectCategory('C')">ランヤード/アブソーバー</button>
            </div>

            <h2>Step 2: Series</h2>
            <div id="sub-categories" class="button-group"></div>

            <h2>Step 3: Items</h2>
            <div id="sub-sub-categories" class="item-list-container"></div>
        </section>

        <section id="estimate-summary">
            <h2>Current Estimate</h2>
            <table id="estimate-table">
                <thead>
                    <tr>
                        <th style="width: 40%;">製品名 / 仕様</th>
                        <th style="text-align:right;">単価</th>
                        <th style="text-align:center;">数量</th>
                        <th style="text-align:right;">小計</th>
                        <th style="width: 50px;"></th>
                    </tr>
                </thead>
                <tbody id="summary-list">
                    </tbody>
            </table>

            <div class="total-container">
                <div class="total-row">
                    <span class="total-label">合計数量:</span>
                    <span id="total-qty">0</span> 点
                </div>
                <div class="total-row main-total">
                    <span class="total-label">総計 (税抜):</span>
                    <span id="total-price">0</span>
                </div>
            </div>

            <div class="export-group">
                <button class="print-btn" onclick="window.print()">PRINT / PDF</button>
                <button class="reset-btn" onclick="resetEstimate()">最初からやり直す</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
